[pytest]
testpaths = tests
pythonpath = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 标记
markers =
    api: API 接口测试
    e2e: E2E 端到端测试
    slow: 慢速测试
    integration: 集成测试（需要数据库）

# 输出配置
addopts =
    -v
    --tb=short
    --strict-markers
    -p no:warnings

# 日志
log_cli = true
log_cli_level = INFO

# 环境变量
env_files =
    .env.test
