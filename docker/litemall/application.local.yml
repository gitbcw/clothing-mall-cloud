# ===========================================
# Clothing Mall 本地开发环境配置
# ===========================================

spring:
  profiles:
    active: none
  message:
    encoding: UTF-8
  datasource:
    druid:
      url: ${SPRING_DATASOURCE_URL:jdbc:mysql://mysql:3306/clothing_mall?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&verifyServerCertificate=false&useSSL=false&connectionCollation=utf8mb4_unicode_ci}
      driver-class-name: com.mysql.cj.jdbc.Driver
      username: ${SPRING_DATASOURCE_USERNAME:clothing_mall}
      password: ${SPRING_DATASOURCE_PASSWORD:clothing123456}
      initial-size: 5
      max-active: 20
      min-idle: 5
      max-wait: 60000
      pool-prepared-statements: true
      max-pool-prepared-statement-per-connection-size: 20
      validation-query: SELECT 1 FROM DUAL
      test-on-borrow: false
      test-on-return: false
      test-while-idle: true
      time-between-eviction-runs-millis: 60000
      filters: stat,wall

server:
  port: 8080

logging:
  config: classpath:logback-spring.xml
  level:
    root: INFO
    org.linlinjava: DEBUG

pagehelper:
  helperDialect: mysql
  reasonable: true
  supportMethodsArguments: true
  params: count=countSql

litemall:
  # 微信小程序配置（从环境变量读取）
  wx:
    app-id: ${LITEMALL_WX_APP_ID:wxa5b486c6b918ecfb}
    app-secret: ${LITEMALL_WX_APP_SECRET:e04004829d4c383b4db7769d88dfbca1}
    mch-id: ${WX_MCH_ID:111111}
    mch-key: ${WX_MCH_KEY:xxxxxx}
    notify-url: ${LITEMALL_WX_NOTIFY_URL:http://localhost:8088/wx/order/pay-notify}
    key-path: xxxxx
    # 支付签名类型，可选 MD5 或 HMAC-SHA256（推荐）
    sign-type: ${WX_SIGN_TYPE:HMAC-SHA256}

  # 通知配置（本地开发默认关闭）
  notify:
    mail:
      enable: false
      host: smtp.exmail.qq.com
      username: ex@ex.com.cn
      password: XXXXXXXXXXXXX
      sendfrom: ex@ex.com.cn
      sendto: ex@qq.com
      port: 465

    sms:
      enable: false
      active: tencent
      sign: litemall
      template:
        - name: paySucceed
          templateId: 156349
        - name: captcha
          templateId: 156433
        - name: ship
          templateId: 158002
        - name: refund
          templateId: 159447
      tencent:
        appid: 111111111
        appkey: xxxxxxxxxxxxxx
      aliyun:
        regionId: xxx
        accessKeyId: xxx
        accessKeySecret: xxx

  # 快递物流查询配置（阿里云市场API）
  express:
    enable: ${EXPRESS_ENABLE:false}
    appcode: ${EXPRESS_APPCODE:}
    vendors:
      - code: "ZTO"
        name: "中通快递"
      - code: "YTO"
        name: "圆通速递"
      - code: "YD"
        name: "韵达速递"
      - code: "YZPY"
        name: "邮政快递包裹"
      - code: "EMS"
        name: "EMS"

  # 对象存储配置（本地开发使用本地存储）
  storage:
    active: ${LITEMALL_STORAGE_ACTIVE:local}
    local:
      storagePath: storage
      address: ${LITEMALL_STORAGE_LOCAL_ADDRESS:http://localhost:8088/wx/storage/fetch/}
    aliyun:
      endpoint: ${ALIYUN_OSS_ENDPOINT:oss-cn-shenzhen.aliyuncs.com}
      accessKeyId: ${ALIYUN_OSS_ACCESS_KEY_ID:}
      accessKeySecret: ${ALIYUN_OSS_ACCESS_KEY_SECRET:}
      bucketName: ${ALIYUN_OSS_BUCKET_NAME:}
    tencent:
      secretId: xxx
      secretKey: xxx
      region: xxx
      bucketName: xxx
    qiniu:
      endpoint: http://pd5cb6ulu.bkt.clouddn.com
      accessKey: xxx
      secretKey: xxx
      bucketName: litemall

swagger:
  production: false

  # 吊牌识别配置（火山引擎 doubao）
  ai:
    tag:
      enabled: ${AI_TAG_ENABLED:false}
      api-key: ${DOUBAO_API_KEY:}
      endpoint: https://ark.cn-beijing.volces.com/api/v3/chat/completions
      model: ep-20260406233437-xddjl
      timeout: 30000
