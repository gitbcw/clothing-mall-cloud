# ===========================================
# Clothing Mall 本地开发环境 Docker Compose
# 使用方法: docker compose -f docker-compose.local.yml up -d
# ===========================================

version: '3.8'

services:
  # -------------------------------------------
  # MySQL 数据库
  # -------------------------------------------
  mysql:
    image: mysql:8.0
    container_name: clothing-mall-mysql-local
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    command:
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-authentication-plugin=mysql_native_password
      --innodb-buffer-pool-size=128M
      --max-connections=50
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db/init-sql:/docker-entrypoint-initdb.d:ro
      - ./db/conf.d:/etc/mysql/conf.d:ro
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123456}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-clothing_mall}
      MYSQL_USER: ${MYSQL_USER:-clothing_mall}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-clothing123456}
      TZ: ${TZ:-Asia/Shanghai}
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-root123456}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: ${MYSQL_MEMORY_LIMIT:-512M}
    restart: unless-stopped
    networks:
      - clothing-mall-network

  # -------------------------------------------
  # Java 后端应用
  # -------------------------------------------
  app:
    build:
      context: ./litemall
      dockerfile: Dockerfile.local
      args:
        HTTP_PROXY: ${USE_PROXY:-false}
        PROXY_HOST: ${HTTP_PROXY_HOST:-host.docker.internal}
        PROXY_PORT: ${HTTP_PROXY_PORT:-7897}
    image: clothing-mall-app:local
    container_name: clothing-mall-app-local
    ports:
      - "${APP_EXTERNAL_PORT:-8088}:${APP_INTERNAL_PORT:-8080}"
    volumes:
      - ./litemall/storage:/storage
      - ./litemall/logs:/logs
      - ./litemall/backup:/backup
    environment:
      TZ: ${TZ:-Asia/Shanghai}
      JAVA_OPTS: ${JAVA_OPTS:--Xmx512m -Xms256m}
      # 数据库配置
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-clothing_mall}?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&verifyServerCertificate=false&useSSL=false&connectionCollation=utf8mb4_unicode_ci
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER:-clothing_mall}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD:-clothing123456}
      # 存储配置
      LITEMALL_STORAGE_ACTIVE: ${STORAGE_ACTIVE:-local}
      LITEMALL_STORAGE_LOCAL_ADDRESS: ${STORAGE_LOCAL_ADDRESS:-http://localhost:8088/wx/storage/fetch/}
      # 微信配置
      LITEMALL_WX_APP_ID: ${WX_APP_ID}
      LITEMALL_WX_APP_SECRET: ${WX_APP_SECRET}
      LITEMALL_WX_NOTIFY_URL: ${WX_NOTIFY_URL:-http://localhost:8088/wx/order/pay-notify}
      # 快递物流查询（阿里云市场API）
      EXPRESS_ENABLE: ${EXPRESS_ENABLE:-false}
      EXPRESS_APPCODE: ${EXPRESS_APPCODE:-}
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/admin/index/index"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 768M
    restart: unless-stopped
    networks:
      - clothing-mall-network
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # -------------------------------------------
  # Nginx 反向代理
  # -------------------------------------------
  nginx:
    image: nginx:alpine
    container_name: clothing-mall-nginx-local
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
    volumes:
      - ./nginx/conf.d/local.conf:/etc/nginx/conf.d/default.conf:ro
      - ./admin-dist:/usr/share/nginx/html:ro
    depends_on:
      app:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 128M
    restart: unless-stopped
    networks:
      - clothing-mall-network

# -------------------------------------------
# 网络配置
# -------------------------------------------
networks:
  clothing-mall-network:
    driver: bridge

# -------------------------------------------
# 数据卷配置
# -------------------------------------------
volumes:
  mysql_data:
    name: clothing-mall-mysql-data-local
