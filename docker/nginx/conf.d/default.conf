# HTTP -> HTTPS 跳转
server {
    listen 80;
    server_name www.transmute.cn transmute.cn;
    return 301 https://$host$request_uri;
}

# HTTPS
server {
    listen 443 ssl;
    server_name www.transmute.cn transmute.cn;

    ssl_certificate /etc/nginx/ssl/transmute.cn.pem;
    ssl_certificate_key /etc/nginx/ssl/transmute.cn.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # 后端 API 代理
    location /admin/ {
        proxy_pass http://clothing-mall-app:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /wx/ {
        proxy_pass http://clothing-mall-app:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 管理后台前端
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /usr/share/nginx/html/index.html;
    }

    # 静态资源缓存
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|otf)$ {
        root /usr/share/nginx/html;
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
    }

    # Gzip 压缩
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
}
